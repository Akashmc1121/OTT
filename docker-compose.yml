version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: ott-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ottdb
      MYSQL_USER: ottuser
      MYSQL_PASSWORD: ottpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - ott-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s

  app:
    image: ott-platform:latest
    container_name: ott-app-container
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=ottdb
      - DB_USERNAME=ottuser
      - DB_PASSWORD=ottpass
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  ott-mysql-data:

